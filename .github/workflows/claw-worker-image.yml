name: claw-worker image

# Builds agent/worker into a multi-arch image and pushes to GHCR.
#   - push to main touching agent/worker/**  -> :main, :sha-xxxx, :latest
#   - tag worker-v*                          -> :<version>, :latest
#   - manual run                             -> :manual
on:
  push:
    branches: [main]
    paths: ["agent/worker/**", ".github/workflows/claw-worker-image.yml"]
    tags: ["worker-v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mimo-claw-worker" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=match,pattern=worker-v(.*),group=1

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: agent/worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
