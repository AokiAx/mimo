# MiMo claw-worker — deploy on a mainland-China NAS / host.
#   1. cp .env.example .env  &&  edit values
#   2. docker compose up -d
#   3. upgrade later:  docker compose pull && docker compose up -d
services:
  claw-worker:
    image: ghcr.io/aoki2008/mimo-claw-worker:latest
    container_name: mimo-claw-worker
    restart: always
    env_file: .env
    # The host must reach MiMo from a mainland IP. If this host is NOT mainland
    # but a same-LAN device is, set MIMO_PROXY in .env to that device's SOCKS.
    # network_mode: host   # uncomment if you need MIMO_PROXY to a LAN address
